<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Читалка</title>
    <link rel="stylesheet" href="reader.css">
</head>

<body>
    <div class="reader-container">
        <header class="reader-header">
            <div class="header-left">
                <button id="btn-back" class="btn-icon" title="Назад">← Назад</button>
                <h1 id="book-title" class="book-title">Загрузка...</h1>
            </div>
            <div class="header-center">
                <button id="btn-prev" class="btn-icon">◀</button>
                <span id="page-info" class="page-info">- / -</span>
                <button id="btn-next" class="btn-icon">▶</button>
            </div>
            <div class="header-right">
                <button id="btn-settings" class="btn-icon">⚙️</button>
                <button id="btn-fullscreen" class="btn-icon">⛶</button>
            </div>
        </header>

        <div id="settings-panel" class="settings-panel hidden">
            <div class="settings-group">
                <label>Размер шрифта:</label>
                <div class="font-size-controls">
                    <button id="font-decrease" class="btn-small">A-</button>
                    <span id="font-size-value" class="font-size-value">16px</span>
                    <button id="font-increase" class="btn-small">A+</button>
                </div>
            </div>
            <div class="settings-group">
                <label>Шрифт:</label>
                <select id="font-select">
                    <option value="Georgia">Georgia</option>
                    <option value="Arial">Arial</option>
                    <option value="Times New Roman">Times New Roman</option>
                </select>
            </div>
            <div class="settings-group">
                <label>Тема:</label>
                <div class="theme-buttons">
                    <button data-theme="light" class="theme-btn active">☀️ Светлая</button>
                    <button data-theme="dark" class="theme-btn">🌙 Темная</button>
                    <button data-theme="sepia" class="theme-btn">📜 Сепия</button>
                </div>
            </div>
        </div>

        <main class="content-area">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Загрузка книги...</p>
            </div>
            <div id="book-content" class="book-content hidden"></div>
            <div id="error-message" class="error-message hidden">
                <h2>😕 Не удалось загрузить книгу</h2>
                <p id="error-text">Произошла ошибка</p>
                <button id="retry-btn" class="btn-primary">Попробовать снова</button>
                <button id="demo-btn" class="btn-secondary">Демо-книга</button>
            </div>
        </main>

        <footer class="reader-footer">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </footer>
    </div>

    <!-- Библиотеки - правильные относительные пути -->
    <script src="lib/jszip.min.js"></script>
    <script src="lib/epub.min.js"></script>
    <script src="lib/mammoth.browser.min.js"></script>
    <script src="reader.js"></script>
</body>

</html>
